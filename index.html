<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ルーティーン">
  <meta name="theme-color" content="#5aa55a">
  <title>ルーティーン</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --green-100: #f0f9f0;
      --green-200: #d6efd6;
      --green-300: #a8d5a8;
      --green-400: #7bbf7b;
      --green-500: #5aa55a;
      --green-600: #3d8b3d;
      --text-primary: #2d4a2d;
      --text-secondary: #5a7a5a;
      --text-muted: #8faa8f;
      --white: #ffffff;
      --shadow: rgba(90, 165, 90, 0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Helvetica Neue', sans-serif;
      background: var(--green-100);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
    }

    /* ── Header ── */
    .header {
      background: var(--white);
      padding: 20px 20px 16px;
      padding-top: calc(20px + env(safe-area-inset-top));
      border-bottom: 1px solid var(--green-200);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: var(--green-600);
      letter-spacing: -0.3px;
    }

    .date {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .progress-bar-wrap {
      background: var(--green-200);
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green-400), var(--green-500));
      border-radius: 100px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .progress-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .progress-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--green-600);
    }

    /* ── Main ── */
    .main {
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin: 8px 4px 8px;
    }

    /* ── Log ── */
    .log-container {
      background: var(--white);
      border-radius: 14px;
      padding: 12px 0 10px;
      box-shadow: 0 1px 4px var(--shadow);
      overflow: hidden;
    }

    .log-scroll {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      padding: 0 14px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .log-scroll::-webkit-scrollbar { display: none; }

    .log-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      width: 32px;
    }

    .log-day-num {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
      line-height: 1;
    }

    .log-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #eaeeea;
      transition: background 0.3s ease;
    }

    .log-circle.lv0  { background: #dde6dd; }
    .log-circle.lv1  { background: #c2dfc2; }
    .log-circle.lv2  { background: var(--green-300); }
    .log-circle.lv3  { background: var(--green-400); }
    .log-circle.lv4  { background: var(--green-500); }

    .log-weekday {
      font-size: 9px;
      color: var(--text-muted);
      line-height: 1;
    }

    .log-day.today .log-day-num {
      color: var(--green-600);
      font-weight: 700;
    }

    .log-day.today .log-circle {
      outline: 2px solid var(--green-500);
      outline-offset: 2px;
    }

    /* ── Tasks ── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .task-item {
      background: var(--white);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 1px 4px var(--shadow);
      user-select: none;
      transition: transform 0.18s ease, opacity 0.15s ease;
      will-change: transform;
    }

    .task-item.done {
      opacity: 0.5;
    }

    .task-item.done .task-name {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-item.is-dragging {
      visibility: hidden;
    }

    /* Drag handle */
    .drag-handle {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green-300);
      flex-shrink: 0;
      touch-action: none;
      cursor: grab;
    }

    /* Check button */
    .check-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--green-300);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      -webkit-appearance: none;
    }

    .check-btn.checked {
      background: var(--green-500);
      border-color: var(--green-500);
    }

    .check-btn svg {
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .check-btn.checked svg {
      opacity: 1;
    }

    .task-name {
      flex: 1;
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.35;
      min-width: 0;
      word-break: break-all;
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      -webkit-appearance: none;
    }

    .delete-btn:active {
      color: #e05555;
      background: #fff0f0;
    }

    /* Ghost (floating during drag) */
    .task-ghost {
      position: fixed;
      z-index: 999;
      pointer-events: none;
      border-radius: 14px;
      background: var(--white);
      box-shadow: 0 10px 28px rgba(60, 140, 60, 0.22);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      transform: scale(1.03);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state p {
      font-size: 14px;
      margin-top: 10px;
    }

    /* Add form */
    .add-area {
      margin-top: 20px;
      background: var(--white);
      border-radius: 16px;
      padding: 4px 4px 4px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 1px 4px var(--shadow);
      border: 1.5px solid transparent;
      transition: border-color 0.2s;
    }

    .add-area:focus-within {
      border-color: var(--green-400);
    }

    .add-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--text-primary);
      background: transparent;
      padding: 12px 0;
      font-family: inherit;
    }

    .add-input::placeholder { color: var(--text-muted); }

    .add-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--green-500);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
    }

    .add-btn:active {
      background: var(--green-600);
      transform: scale(0.95);
    }

    /* Reset button */
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 13px;
      background: transparent;
      border: 1.5px solid var(--green-300);
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      -webkit-appearance: none;
    }

    .reset-btn:active { background: var(--green-200); }

    /* Celebration */
    .all-done-banner {
      background: linear-gradient(135deg, var(--green-400), var(--green-500));
      color: white;
      border-radius: 16px;
      padding: 18px 20px;
      text-align: center;
      margin-bottom: 12px;
      animation: fadeIn 0.4s ease;
    }

    .all-done-banner .emoji {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }

    .all-done-banner p {
      font-size: 15px;
      font-weight: 600;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    // ホーム画面アイコンをCanvasで生成（iOS対応）
    (function(){
      var c = document.createElement('canvas');
      c.width = c.height = 180;
      var ctx = c.getContext('2d');
      // 背景グラデーション
      var g = ctx.createLinearGradient(0,0,180,180);
      g.addColorStop(0,'#7bbf7b'); g.addColorStop(1,'#3d8b3d');
      ctx.fillStyle = g; ctx.fillRect(0,0,180,180);
      function rr(x,y,w,h,r){
        ctx.beginPath();
        ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
        ctx.quadraticCurveTo(x+w,y,x+w,y+r);
        ctx.lineTo(x+w,y+h-r);
        ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        ctx.lineTo(x+r,y+h);
        ctx.quadraticCurveTo(x,y+h,x,y+h-r);
        ctx.lineTo(x,y+r);
        ctx.quadraticCurveTo(x,y,x+r,y);
        ctx.closePath();
      }
      function check(cy, alpha){
        ctx.beginPath(); ctx.arc(54,cy,15,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,'+alpha+')'; ctx.fill();
        ctx.beginPath(); ctx.moveTo(45,cy); ctx.lineTo(51,cy+7); ctx.lineTo(64,cy-9);
        ctx.strokeStyle='#5aa55a'; ctx.lineWidth=4;
        ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,'+alpha+')';
        rr(80,cy-7,58,13,6.5); ctx.fill();
      }
      // 行1: 未チェック
      ctx.beginPath(); ctx.arc(54,58,15,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=3.5; ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.45)'; rr(80,51,58,13,6.5); ctx.fill();
      // 行2: チェック済み（明）
      check(90, 1);
      // 行3: チェック済み（やや透明）
      check(122, 0.85);
      // apple-touch-iconとして設定
      var l = document.createElement('link');
      l.rel='apple-touch-icon'; l.href=c.toDataURL('image/png');
      document.head.appendChild(l);
    })();
  </script>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="title">🌿 ルーティーン</span>
    <span class="date" id="dateLabel"></span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span class="progress-text" id="progressText">今日のルーティーン</span>
    <span class="progress-count" id="progressCount">0 / 0</span>
  </div>
</div>

<div class="main">
  <div id="allDoneBanner" style="display:none">
    <div class="all-done-banner">
      <span class="emoji">🎉</span>
      <p>全て完了！お疲れさまでした</p>
    </div>
  </div>

  <div class="section-label">達成ログ</div>
  <div class="log-container">
    <div class="log-scroll" id="logScroll"></div>
  </div>

  <div class="section-label" style="margin-top:16px">タスク</div>
  <div class="task-list" id="taskList"></div>

  <div class="add-area">
    <input class="add-input" id="addInput" type="text"
      placeholder="タスクを追加…" maxlength="50" enterkeyhint="done">
    <button class="add-btn" id="addBtn" aria-label="追加">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 3.5v11M3.5 9h11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <button class="reset-btn" id="resetBtn">チェックをリセット</button>
</div>

<script>
  // ─────────────────────────────────────────
  //  Storage keys
  // ─────────────────────────────────────────
  const STATE_KEY = 'routine_v1';
  const LOG_KEY   = 'routine_logs_v1';

  // ─────────────────────────────────────────
  //  Utilities
  // ─────────────────────────────────────────
  function todayStr() {
    return new Date().toLocaleDateString('ja-JP'); // e.g. "2026/6/10"
  }

  function uid() {
    return Math.random().toString(36).slice(2, 9);
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─────────────────────────────────────────
  //  Log storage
  // ─────────────────────────────────────────
  function loadLogs() {
    try { return JSON.parse(localStorage.getItem(LOG_KEY)) || {}; }
    catch { return {}; }
  }

  function saveLogs(logs) {
    localStorage.setItem(LOG_KEY, JSON.stringify(logs));
  }

  // Record today's completion snapshot
  function recordTodayLog() {
    const total = state.tasks.length;
    if (total === 0) return;
    const done = state.tasks.filter(t => t.done).length;
    const logs = loadLogs();
    logs[todayStr()] = { done, total };
    saveLogs(logs);
  }

  // ─────────────────────────────────────────
  //  App state
  // ─────────────────────────────────────────
  function defaultState() {
    return {
      date: todayStr(),
      tasks: [
        { id: uid(), name: '朝の準備', done: false },
        { id: uid(), name: '運動・ストレッチ', done: false },
        { id: uid(), name: '水を飲む', done: false },
      ]
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STATE_KEY);
      if (!raw) return defaultState();
      const s = JSON.parse(raw);
      if (s.date !== todayStr()) {
        // Save yesterday's final log before resetting
        const logs = loadLogs();
        const done = s.tasks.filter(t => t.done).length;
        if (s.tasks.length > 0) logs[s.date] = { done, total: s.tasks.length };
        saveLogs(logs);
        // New day: reset checks
        s.tasks = s.tasks.map(t => ({ ...t, done: false }));
        s.date  = todayStr();
      }
      return s;
    } catch {
      return defaultState();
    }
  }

  function saveState() {
    localStorage.setItem(STATE_KEY, JSON.stringify(state));
  }

  let state = loadState();

  // ─────────────────────────────────────────
  //  Render
  // ─────────────────────────────────────────
  function render() {
    saveState();
    recordTodayLog();
    renderDate();
    renderProgress();
    renderLogs();
    renderTasks();
  }

  function renderDate() {
    document.getElementById('dateLabel').textContent =
      new Date().toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });
  }

  function renderProgress() {
    const total = state.tasks.length;
    const done  = state.tasks.filter(t => t.done).length;
    const pct   = total === 0 ? 0 : Math.round(done / total * 100);
    document.getElementById('progressBar').style.width  = pct + '%';
    document.getElementById('progressCount').textContent = `${done} / ${total}`;
    document.getElementById('progressText').textContent  = pct === 100 ? '全て完了！' : '今日のルーティーン';
    document.getElementById('allDoneBanner').style.display = (total > 0 && done === total) ? 'block' : 'none';
  }

  // ── Log visualization ──
  function renderLogs() {
    const logs   = loadLogs();
    const scroll = document.getElementById('logScroll');
    scroll.innerHTML = '';

    const today = new Date();
    const DAYS  = 5;

    const WEEKDAYS = ['日','月','火','水','木','金','土'];

    for (let i = DAYS - 1; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const dateKey = d.toLocaleDateString('ja-JP');
      const log     = logs[dateKey];
      const isToday = i === 0;

      // Pick color level
      let lvClass = ''; // no data
      if (log && log.total > 0) {
        const ratio = log.done / log.total;
        if      (ratio === 0)   lvClass = 'lv0';
        else if (ratio < 0.25)  lvClass = 'lv1';
        else if (ratio < 0.5)   lvClass = 'lv2';
        else if (ratio < 1)     lvClass = 'lv3';
        else                    lvClass = 'lv4';
      }

      const cell = document.createElement('div');
      cell.className = 'log-day' + (isToday ? ' today' : '');
      cell.innerHTML = `
        <span class="log-day-num">${d.getDate()}</span>
        <div class="log-circle ${lvClass}" title="${log ? log.done + '/' + log.total : ''}"></div>
        <span class="log-weekday">${WEEKDAYS[d.getDay()]}</span>
      `;
      scroll.appendChild(cell);
    }

    // Scroll to rightmost (today)
    scroll.scrollLeft = scroll.scrollWidth;
  }

  // ── Task list ──
  function renderTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';

    if (state.tasks.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="#a8d5a8" stroke-width="2"/>
            <path d="M13 20h14M20 13v14" stroke="#a8d5a8" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <p>タスクを追加してください</p>
        </div>`;
      return;
    }

    state.tasks.forEach(task => {
      const el = document.createElement('div');
      el.className   = 'task-item' + (task.done ? ' done' : '');
      el.dataset.id  = task.id;
      el.innerHTML   = `
        <div class="drag-handle" data-drag="${task.id}" aria-label="並び替え">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <rect y="0"  width="16" height="2" rx="1" fill="currentColor"/>
            <rect y="5"  width="16" height="2" rx="1" fill="currentColor"/>
            <rect y="10" width="16" height="2" rx="1" fill="currentColor"/>
          </svg>
        </div>
        <span class="task-name">${esc(task.name)}</span>
        <button class="check-btn ${task.done ? 'checked' : ''}" data-check="${task.id}" aria-label="完了">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="delete-btn" data-del="${task.id}" aria-label="削除">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      `;
      list.appendChild(el);
    });

    // Bind buttons
    list.querySelectorAll('[data-check]').forEach(btn =>
      btn.addEventListener('click', () => toggleTask(btn.dataset.check)));
    list.querySelectorAll('[data-del]').forEach(btn =>
      btn.addEventListener('click', () => deleteTask(btn.dataset.del)));

    // Bind drag handles
    list.querySelectorAll('[data-drag]').forEach(handle => {
      handle.addEventListener('touchstart', onDragStart, { passive: false });
    });
  }

  // ─────────────────────────────────────────
  //  Actions
  // ─────────────────────────────────────────
  function toggleTask(id) {
    const t = state.tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    render();
  }

  function deleteTask(id) {
    state.tasks = state.tasks.filter(t => t.id !== id);
    render();
  }

  function addTask(name) {
    name = name.trim();
    if (!name) return;
    state.tasks.push({ id: uid(), name, done: false });
    render();
  }

  // ─────────────────────────────────────────
  //  Drag & Drop (touch)
  // ─────────────────────────────────────────
  let drag = null;

  function onDragStart(e) {
    e.preventDefault();
    const taskId  = e.currentTarget.dataset.drag;
    const fromIdx = state.tasks.findIndex(t => t.id === taskId);
    if (fromIdx < 0) return;

    const list     = document.getElementById('taskList');
    const allItems = [...list.querySelectorAll('.task-item[data-id]')];
    const srcEl    = allItems[fromIdx];
    const srcRect  = srcEl.getBoundingClientRect();
    const touchY   = e.touches[0].clientY;

    // Ghost element
    const ghost = document.createElement('div');
    ghost.className = 'task-ghost';
    ghost.style.left  = srcRect.left + 'px';
    ghost.style.top   = srcRect.top  + 'px';
    ghost.style.width = srcRect.width + 'px';
    ghost.innerHTML   = srcEl.innerHTML;
    document.body.appendChild(ghost);

    // Hide source
    srcEl.classList.add('is-dragging');

    // Store original rects
    const origRects = allItems.map(el => el.getBoundingClientRect());

    drag = {
      taskId, fromIdx,
      ghost, srcEl, allItems, origRects,
      touchOffsetY: touchY - srcRect.top,
      toIdx: fromIdx,
      itemH: srcRect.height + 8   // height + gap
    };
  }

  document.addEventListener('touchmove', e => {
    if (!drag) return;
    e.preventDefault();

    const touchY = e.touches[0].clientY;

    // Move ghost
    drag.ghost.style.top = (touchY - drag.touchOffsetY) + 'px';

    // Determine toIdx from touch position vs. original rects of non-source items
    const nonSource = drag.allItems
      .map((el, i) => ({ i, rect: drag.origRects[i] }))
      .filter(x => x.i !== drag.fromIdx);

    let toIdx = nonSource.length; // default: after all
    for (let j = 0; j < nonSource.length; j++) {
      const mid = nonSource[j].rect.top + nonSource[j].rect.height / 2;
      if (touchY < mid) { toIdx = j; break; }
    }

    if (toIdx !== drag.toIdx) {
      drag.toIdx = toIdx;
      applyDragTransforms();
    }
  }, { passive: false });

  document.addEventListener('touchend',    endDrag);
  document.addEventListener('touchcancel', endDrag);

  function applyDragTransforms() {
    if (!drag) return;
    const { allItems, origRects, fromIdx, toIdx, itemH } = drag;

    // Non-source items in order (filtered)
    const ns = allItems
      .map((el, i) => ({ el, i }))
      .filter(x => x.i !== fromIdx);

    ns.forEach(({ el }, j) => {
      // j  = index in filtered (non-source) array
      // toIdx = insertion point in filtered array
      // fromIdx = original full index of source
      // shift = ((j >= toIdx ? 1 : 0) - (j >= fromIdx ? 1 : 0)) * itemH
      const s = ((j >= toIdx ? 1 : 0) - (j >= fromIdx ? 1 : 0)) * itemH;
      el.style.transition = 'transform 0.18s ease';
      el.style.transform  = s !== 0 ? `translateY(${s}px)` : '';
    });
  }

  function endDrag() {
    if (!drag) return;

    // Reset transforms
    drag.allItems.forEach(el => {
      el.style.transform  = '';
      el.style.transition = '';
    });
    drag.srcEl.classList.remove('is-dragging');
    drag.ghost.remove();

    // Commit new order
    if (drag.toIdx !== drag.fromIdx) {
      const tasks   = [...state.tasks];
      const [moved] = tasks.splice(drag.fromIdx, 1);
      tasks.splice(drag.toIdx, 0, moved);
      state.tasks = tasks;
      render();
    }

    drag = null;
  }

  // ─────────────────────────────────────────
  //  Event listeners
  // ─────────────────────────────────────────
  document.getElementById('addBtn').addEventListener('click', () => {
    const inp = document.getElementById('addInput');
    addTask(inp.value);
    inp.value = '';
    inp.focus();
  });

  document.getElementById('addInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      addTask(e.target.value);
      e.target.value = '';
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    state.tasks = state.tasks.map(t => ({ ...t, done: false }));
    render();
  });

  // ─────────────────────────────────────────
  //  Init
  // ─────────────────────────────────────────
  render();
</script>
</body>
</html>
